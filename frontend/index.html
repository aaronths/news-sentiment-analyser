<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Sentiment Analyser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">MVP dashboard</p>
        <h1>News sentiment analyser</h1>
        <p class="hero-copy">
          Search a keyword, retrieve matching articles from the cleaned news pool, and rank
          outlets from most positive to most negative sentiment.
        </p>
      </section>

      <section class="panel controls">
        <form id="search-form">
          <label>
            Runtime API URL
            <input
              id="api-url"
              type="url"
              placeholder="https://your-api-gateway-or-lambda-url"
              required
            />
          </label>

          <label>
            Keyword
            <input id="keyword" type="text" placeholder="election" minlength="2" required />
          </label>

          <label>
            Article preview limit
            <input id="limit" type="number" min="1" max="100" value="10" />
          </label>

          <button type="submit">Analyse sentiment</button>
        </form>

        <p id="status" class="status">Ready.</p>
      </section>

      <section class="panel" id="summary-panel" hidden>
        <h2>Outlet ranking</h2>
        <div id="summary-cards" class="summary-grid"></div>
      </section>

      <section class="panel" id="articles-panel" hidden>
        <h2>Matched articles</h2>
        <div id="articles-list" class="article-list"></div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
