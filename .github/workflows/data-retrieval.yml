name: CI - Data Retrieval

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/data-retrieval

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/data-retrieval/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Typecheck (lint via TypeScript)
        run: npx tsc --noEmit


